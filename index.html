<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>for us</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  height: 100vh;
  overflow: hidden;
  font-family: 'Inter', sans-serif;
  color: whitesmoke;
}

.bg {
  position: fixed;
  width: 100%;
  height: 300%;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  animation: scrollUp 30s linear infinite;
}

.bg img {
  width: 100%;
  height: 300px;
  object-fit: cover;
  filter: brightness(0.6);
  display: block;
}

/* animasi background */
@keyframes scrollUp {
  0% {
    transform: translateY(0);
  }

  100% {
    transform: translateY(-50%);
  }
}

/* blur */
.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  backdrop-filter: blur(10px);
  background: rgba(0, 0, 0, 0.4);
}

.content {
  position: relative;
  z-index: 2;
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  text-align: center;
}

/* bagian tengah */
.center {
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  margin: auto;
}

/* jumlah hari */
.days {
  font-size: 55px;
  font-weight: bold;
  color: #093C5D;
  text-decoration: underline;
  margin-bottom: 5px;
}

/* bagian bawah */
.bottom {
  margin-bottom: 50px;
  opacity: 0.8;
  line-height: 1.8;
  font-size: 16px;
}

.card {
  backdrop-filter: blur(20px);
  background: #629FAD;
  border-radius: 25px;
  padding: 35px 55px;
  display: inline-block;

  box-shadow: 0 8px 30px #0C2C55;
  border: 1px solid #0C2C55;

  animation: fadeIn 1.5s ease;
}

@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(20px);
  }

  to {
    opacity: 1;
    transform: translateY(0);
  }
}
</style>
</head>

<body>

<!-- foto background -->
<div class="bg">
  <img src="asset/foto4.png">
  <img src="asset/foto5.png">
  <img src="asset/foto6.png">
  <img src="asset/foto7.png">

  <img src="asset/foto4.png">
  <img src="asset/foto5.png">
  <img src="asset/foto6.png">
  <img src="asset/foto7.png">

  <img src="asset/foto4.png">
  <img src="asset/foto5.png">
  <img src="asset/foto6.png">
  <img src="asset/foto7.png">

  <img src="asset/foto4.png">
  <img src="asset/foto5.png">
  <img src="asset/foto6.png">
  <img src="asset/foto7.png">
</div>

<div class="overlay"></div>

<!-- konten -->
<div class="content">
  <div class="center">
    <div class="card">
      <div class="days" id="days">0 hari</div>
    </div>
  </div>

  <div class="bottom">
    <div>the days we’ve shared, sayang &lt;3.</div>
    <div>thank you for everything. i'll miss our moments, i love you!</div>
  </div>
</div>

<script>
// tanggal mulai
const startDate = new Date("April 4, 2026 00:00:00").getTime();

// tanggal berhenti
const endDate = new Date("June 3, 2026 00:00:00").getTime();

function updateDays() {
  const diff = endDate - startDate;

  const totalSeconds = Math.floor(diff / 1000);
  const days = Math.floor(totalSeconds / (24 * 3600));

  document.getElementById("days").innerHTML = days + " hari";
}

updateDays();
</script>

</body>
</html>
