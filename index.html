<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title> for us </title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  height: 100vh;
  overflow: hidden;
  font-family: 'Inter', sans-serif;
  color: whitesmoke;
}

.bg {
  position: fixed;
  width: 100%;
  height: 300%; 
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  animation: scrollUp 30s linear infinite;
}

.bg img {
  width: 100%;
  height: 300px;
  object-fit: cover;
  filter: brightness(0.6);
  display: block;
}

/* animasi */
@keyframes scrollUp {
  0% { transform: translateY(0); }
  100% { transform: translateY(-50%); }
}

/* blur */
.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  backdrop-filter: blur(10px);
  background: rgba(0,0,0,0.4);
}

.content {
  position: relative;
  z-index: 2;
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  text-align: center;
}

/* buat anuan tengahnya */
.center {
  text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin: auto;
}

/* days */
.days {
  font-size: 40px;
  font-weight: bold;
  color: #093C5D;
  text-decoration: underline;
  margin-bottom: 20px;
}

/* buat anuan jamnya */
.clock {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}

/* BOX TIME */
.time-box {
  font-size: 50px;
  padding: 15px 20px;
  border-radius: 15px;

  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);

  border: 1px solid rgba(255,255,255,0.2);
  box-shadow: 0 4px 15px rgba(0,0,0,0.3);

  transition: all 0.2s ease;
}

.separator {
  font-size: 40px;
  opacity: 0.7;
  animation: blink 1s infinite;
}

/* kedip kayak jam digital */
@keyframes blink {
  0%,100% { opacity: 0.7; }
  50% { opacity: 0.2; }
}

.bottom {
  margin-bottom: 50px;
  opacity: 0.8;
}

.card {
  backdrop-filter: blur(20px);
  background: #629FAD;
  border-radius: 25px;
  padding: 25px 40px;
  display: inline-block;
  
  box-shadow: 0 8px 30px #0C2C55;
  border: 1px solid #0C2C55;

  animation: fadeIn 1.5s ease;
}

@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
</style>
</head>

<body>

<!-- foto -->
<div class="bg">
  <img src="asset/foto4.png">
  <img src="asset/foto5.png">
  <img src="asset/foto6.png">
  <img src="asset/foto7.png">

  <img src="asset/foto4.png">
  <img src="asset/foto5.png">
  <img src="asset/foto6.png">
  <img src="asset/foto7.png">

  <img src="asset/foto4.png">
  <img src="asset/foto5.png">
  <img src="asset/foto6.png">
  <img src="asset/foto7.png">
  
  <img src="asset/foto4.png">
  <img src="asset/foto5.png">
  <img src="asset/foto6.png">
  <img src="asset/foto7.png">
</div>

<div class="overlay"></div>

<!-- konten tengah isinya -->
<div class="content">
  <div class="center">
    <div class="card">
      <div class="days" id="days">0 hari</div>

      <div class="clock">
        <div class="time-box" id="hours">00</div>
        <div class="separator">:</div>
        <div class="time-box" id="minutes">00</div>
        <div class="separator">:</div>
        <div class="time-box" id="seconds">00</div>
      </div>

    </div>
  </div>

  <div class="bottom">the days we’ve shared, sayang <3 </div>
</div>

<script>
const startDate = new Date("April 4, 2026 00:00:00").getTime();

function updateClock() {
  const now = new Date().getTime();
  const diff = now - startDate;

  const totalSeconds = Math.floor(diff / 1000);
  const days = Math.floor(totalSeconds / (24 * 3600));
  const hours = Math.floor(totalSeconds / 3600);
  const minutes = Math.floor((totalSeconds % 3600) / 60);
  const seconds = totalSeconds % 60;

  document.getElementById("days").innerHTML = days + " hari";

  document.getElementById("hours").innerHTML =
    String(hours).padStart(2,'0');

  document.getElementById("minutes").innerHTML =
    String(minutes).padStart(2,'0');

  document.getElementById("seconds").innerHTML =
    String(seconds).padStart(2,'0');

// notifikasi setiap bulan
   let lastMonthNotified = -1;

function checkMonthlyNotification(days) {
  const month = Math.floor(days / 30);

  if (month > 0 && month !== lastMonthNotified && days % 30 === 0) {
    lastMonthNotified = month;
    showNotification(month);
  }
}

function showNotification(month) {
  alert("💗 Selamat " + month + " bulan bersama! 💗");
}

  checkMonthlyNotification(days);
}

setInterval(updateClock, 1000);
updateClock();
</script>

</body>
</html>
